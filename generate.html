<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card Generator — Matchlytics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f8f9fa;
            color: #1f2937;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }

        .header {
            background: #111827;
            color: white;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .body { padding: 24px; }

        .field { margin-bottom: 16px; }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #111827;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .field input:focus {
            outline: none;
            border-color: #111827;
            box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.08);
        }

        .hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .result {
            margin-top: 8px;
            padding: 20px;
            background: #f8f9fa;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            text-align: center;
        }

        .result-label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }

        .qr-box {
            display: inline-block;
            padding: 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            margin-bottom: 16px;
        }

        .link-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .link-row input {
            flex: 1;
            min-width: 0;
            padding: 10px 12px;
            font-size: 13px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #111827;
        }

        .btn {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary { background-color: #111827; color: white; }
        .btn-primary:hover { background-color: #1f2937; }

        .btn-secondary {
            background-color: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .btn-secondary:hover { background-color: #e5e7eb; }

        .btn-block { width: 100%; }

        .actions {
            display: flex;
            gap: 8px;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Business Card Generator</h1>
                <p>Fill in the details to create a shareable Matchlytics card</p>
            </div>
            <div class="body">
                <div class="field">
                    <label for="n">Full name</label>
                    <input type="text" id="n" placeholder="Ana Sousa" autocomplete="off">
                </div>
                <div class="field">
                    <label for="t">Job title</label>
                    <input type="text" id="t" placeholder="Head of Sales" autocomplete="off">
                </div>
                <div class="field">
                    <label for="e">Email</label>
                    <input type="email" id="e" placeholder="ana@matchlytics.ai" autocomplete="off">
                </div>
                <div class="field">
                    <label for="p">Phone / WhatsApp</label>
                    <input type="tel" id="p" placeholder="+351 900000000" autocomplete="off">
                </div>
                <div class="field">
                    <label for="l">LinkedIn URL</label>
                    <input type="url" id="l" placeholder="https://www.linkedin.com/in/ana-sousa" autocomplete="off">
                </div>
                <div class="field">
                    <label for="ph">Photo URL (optional)</label>
                    <input type="url" id="ph" placeholder="https://...jpg" autocomplete="off">
                    <div class="hint">Leave empty to show the person's initials instead.</div>
                </div>

                <div class="result">
                    <div class="result-label">Shareable link &amp; QR code</div>
                    <div class="qr-box"><div id="qrcode"></div></div>
                    <div class="link-row">
                        <input type="text" id="link" readonly>
                        <button class="btn btn-secondary" id="copyBtn">Copy</button>
                    </div>
                    <div class="actions">
                        <a class="btn btn-primary btn-block" id="openBtn" target="_blank" rel="noopener">Open card</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fields = ['n', 't', 'e', 'p', 'l', 'ph'];
        const linkInput = document.getElementById('link');
        const openBtn = document.getElementById('openBtn');
        const qrEl = document.getElementById('qrcode');

        function buildUrl() {
            const params = new URLSearchParams();
            fields.forEach(key => {
                const val = document.getElementById(key).value.trim();
                if (val) params.set(key, val);
            });
            // Card lives at index.html in the same directory as this generator.
            const base = new URL('index.html', window.location.href);
            const query = params.toString();
            return base.toString() + (query ? '?' + query : '');
        }

        function render() {
            const url = buildUrl();
            linkInput.value = url;
            openBtn.href = url;

            const qr = qrcode(0, 'M');
            qr.addData(url);
            qr.make();
            qrEl.innerHTML = qr.createImgTag(4, 8);
        }

        fields.forEach(key => {
            document.getElementById(key).addEventListener('input', render);
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            linkInput.select();
            navigator.clipboard.writeText(linkInput.value).then(() => {
                const btn = document.getElementById('copyBtn');
                const original = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => { btn.textContent = original; }, 1500);
            }).catch(() => {
                document.execCommand('copy');
            });
        });

        render();
    </script>
</body>
</html>
